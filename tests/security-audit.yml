name: DevSecOps Automated Audit

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  security-tests:
    runs-on: ubuntu-latest

    steps:
      # Langkah 1: Kloning repositori kode Anda ke server GitHub
      - name: Checkout Code
        uses: actions/checkout@v3

      # Langkah 2: Menyiapkan Python versi 3.10
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Langkah 3: Menginstal dependensi API backend
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy python-dotenv bcrypt pyjwt pydantic requests httpx pytest google-genai

      # Langkah 4: Menjalankan Pengujian Pytest
      - name: Run Security Audit (Pytest)
        run: |
          python -m pytest tests/ -v
