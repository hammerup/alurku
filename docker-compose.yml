version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: alurku_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/alurku_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

  databasement:
    image: davidcrty/databasement:1.6.7
    container_name: databasement
    restart: unless-stopped
    ports:
      - "2226:2226"
    environment:
      - APP_URL=http://localhost:2226
      - APP_KEY=base64:BhxIzN/8xqJ+kbKcP5NDxSW8MFs6bm4lpz1tfMQb5no=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/data/database.sqlite
    volumes:
      - databasement_data:/data
    depends_on:
      - db

  databasement-worker:
    image: davidcrty/databasement:1.6.7
    container_name: databasement-worker
    restart: unless-stopped
    command: sh -c "php artisan db:wait --check-migrations && php artisan queue:work --queue=backups,default --tries=3 --timeout=3600 --sleep=3 --max-jobs=1000"
    environment:
      - APP_URL=http://localhost:2226
      - APP_KEY=base64:BhxIzN/8xqJ+kbKcP5NDxSW8MFs6bm4lpz1tfMQb5no=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/data/database.sqlite
    volumes:
      - databasement_data:/data
    depends_on:
      - databasement

volumes:
  postgres_data:
  databasement_data:
