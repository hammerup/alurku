name: Deploy alurku. to VPS

on:
  push:
    branches:
      - main  # Memicu deploy otomatis setiap kali push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /home/workspace/alurku
            echo "=== Menarik Kode Terbaru ==="
            git pull
            
            echo "=== Membangun Ulang Frontend ==="
            cd frontend-app
            npm install
            npm run build
            cd ..
            
            echo "=== Memeriksa Migrasi Database ==="
            source .venv/bin/activate
            alembic upgrade head
            
            echo "=== Me-restart API Backend ==="
            pm2 restart alurku-backend
            
            echo "=== Deploy Selesai! ==="
